COUPONS_DB:
- type: NoSQLDatabase
- kind: MongoDB
- dependencies: []
- schema:
  - fields:
    - _: coupons_app.Coupon struct{CouponID int, Category string}
    - Coupon: coupons_app.Coupon struct{CouponID int, Category string}
    - ClaimedCoupon: coupons_app.ClaimedCoupon struct{CouponID int, UserID int}
  - unfolded_fields:
    - Coupon: coupons_app.Coupon struct{CouponID int, Category string}
    - Coupon.CouponID: int
    - Coupon.Category: string
    - Coupon.userID: int
    - ClaimedCoupon: coupons_app.ClaimedCoupon struct{CouponID int, UserID int}
    - ClaimedCoupon.CouponID: int
    - ClaimedCoupon.UserID: int
  - constraints:
    - UNIQUE(Coupon.CouponID)
    - UNIQUE(ClaimedCoupon.CouponID, ClaimedCoupon.UserID)

STUDENTS_DB:
- type: NoSQLDatabase
- kind: MongoDB
- dependencies: []
- schema:
  - fields:
    - _: coupons_app.Student struct{StudentID int, Name string, Balance int}
    - Student: coupons_app.Student struct{StudentID int, Name string, Balance int}
  - unfolded_fields:
    - Student: coupons_app.Student struct{StudentID int, Name string, Balance int}
    - Student.StudentID: int
    - Student.Name: string
    - Student.Balance: int
  - constraints:
    - UNIQUE(Student.StudentID)
