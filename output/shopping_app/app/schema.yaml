ANALYTICS_DB:
- type: NoSQLDatabase
- kind: MongoDB
- dependencies: []
- schema:
  - fields:
    - _: shopping_app.Analytics struct{UserID string, Categories []string}
    - Analytics: shopping_app.Analytics struct{UserID string, Categories []string}
  - unfolded_fields:
    - _.userID: string
    - Analytics: shopping_app.Analytics struct{UserID string, Categories []string}
    - Analytics.UserID: string
    - Analytics.Categories: '[]string'

ANALYTICS_QUEUE:
- type: Queue
- kind: RabbitMQ
- dependencies: []
- schema:
  - fields:
    - _: shopping_app.AnalyticsMessage struct{UserID string, ProductCategory string}
    - AnalyticsMessage: shopping_app.AnalyticsMessage struct{UserID string, ProductCategory string}
  - unfolded_fields:
    - AnalyticsMessage: shopping_app.AnalyticsMessage struct{UserID string, ProductCategory string}
    - AnalyticsMessage.UserID: string
    - AnalyticsMessage.ProductCategory: string
  - constraints:
    - REFERENCE(AnalyticsMessage.UserID --> Order.UserID) [+]
    - REFERENCE(AnalyticsMessage.UserID --> Bill.UserID) [+]
    - REFERENCE(AnalyticsMessage --> Order.UserID) [+]
    - REFERENCE(AnalyticsMessage --> Bill.UserID) [+]

BILLING_DB:
- type: NoSQLDatabase
- kind: MongoDB
- dependencies: []
- schema:
  - fields:
    - _: shopping_app.Bill struct{UserID string, ProductID string, Quantity int, PricePerUnit int, TotalCost }
    - Bill: shopping_app.Bill struct{UserID string, ProductID string, Quantity int, PricePerUnit int, TotalCost }
  - unfolded_fields:
    - Bill: shopping_app.Bill struct{UserID string, ProductID string, Quantity int, PricePerUnit int, TotalCost }
    - Bill.UserID: string
    - Bill.ProductID: string
    - Bill.Quantity: int
    - Bill.PricePerUnit: int
    - Bill.TotalCost: ""
  - constraints:
    - REFERENCE(Bill.Quantity --> Order.Quantity) [+]
    - REFERENCE(Bill.Quantity --> Stock.Quantity) [+]
    - REFERENCE(Bill.ProductID --> Order.ProductID) [+]
    - REFERENCE(Bill.ProductID --> Stock.ProductID) [+]
    - REFERENCE(Bill.UserID --> Order.UserID) [+]
    - REFERENCE(Bill.TotalCost --> Order.Quantity) [+]
    - REFERENCE(Bill.TotalCost --> Stock.Quantity) [+]
    - REFERENCE(Bill --> Order.ProductID) [+]
    - REFERENCE(Bill --> Stock.ProductID) [+]
    - REFERENCE(Bill --> Order.Quantity) [+]
    - REFERENCE(Bill --> Stock.Quantity) [+]
    - REFERENCE(Bill --> Order.UserID) [+]

CART_DB:
- type: NoSQLDatabase
- kind: MongoDB
- dependencies: []
- schema:
  - fields:
    - _: shopping_app.Cart struct{CartID string, UserID string, ProductID string, Quantity int, PricePerUnit int, Status string}
    - Cart: shopping_app.Cart struct{CartID string, UserID string, ProductID string, Quantity int, PricePerUnit int, Status string}
  - unfolded_fields:
    - _.cartID: string
    - Cart: shopping_app.Cart struct{CartID string, UserID string, ProductID string, Quantity int, PricePerUnit int, Status string}
    - Cart.CartID: string
    - Cart.UserID: string
    - Cart.ProductID: string
    - Cart.Quantity: int
    - Cart.PricePerUnit: int
    - Cart.Status: string

ORDER_DB:
- type: NoSQLDatabase
- kind: MongoDB
- dependencies: []
- schema:
  - fields:
    - _: shopping_app.Order struct{OrderID string, UserID string, ProductID string, Quantity int, Timestamp 1 int}
    - Order: shopping_app.Order struct{OrderID string, UserID string, ProductID string, Quantity int, Timestamp 1 int}
  - unfolded_fields:
    - _.orderID: string
    - Order: shopping_app.Order struct{OrderID string, UserID string, ProductID string, Quantity int, Timestamp 1 int}
    - Order.OrderID: string
    - Order.UserID: string
    - Order.ProductID: string
    - Order.Quantity: int
    - Order.Timestamp: 1 int

PRODUCT_DB:
- type: NoSQLDatabase
- kind: MongoDB
- dependencies: []
- schema:
  - fields:
    - _: <unknown type>
  - unfolded_fields:
    - _.productID: string

SHIPMENT_DB:
- type: NoSQLDatabase
- kind: MongoDB
- dependencies: []
- schema:
  - fields:
    - _: shopping_app.Shipment struct{OrderID string, UserID string, Status "pending" string}
    - Shipment: shopping_app.Shipment struct{OrderID string, UserID string, Status "pending" string}
  - unfolded_fields:
    - Shipment: shopping_app.Shipment struct{OrderID string, UserID string, Status "pending" string}
    - Shipment.OrderID: string
    - Shipment.UserID: string
    - Shipment.Status: '"pending" string'
  - constraints:
    - REFERENCE(Shipment.OrderID --> _.orderID)
    - REFERENCE(Shipment --> _.orderID)

SHIPMENT_QUEUE:
- type: Queue
- kind: RabbitMQ
- dependencies: []
- schema:
  - fields:
    - _: shopping_app.ShipmentMessage struct{OrderID string, UserID string}
    - ShipmentMessage: shopping_app.ShipmentMessage struct{OrderID string, UserID string}
  - unfolded_fields:
    - ShipmentMessage: shopping_app.ShipmentMessage struct{OrderID string, UserID string}
    - ShipmentMessage.OrderID: string
    - ShipmentMessage.UserID: string
  - constraints:
    - REFERENCE(ShipmentMessage.UserID --> Order.UserID) [+]
    - REFERENCE(ShipmentMessage.UserID --> AnalyticsMessage.UserID) [+]
    - REFERENCE(ShipmentMessage.UserID --> Bill.UserID) [+]
    - REFERENCE(ShipmentMessage.OrderID --> Order.OrderID) [+]
    - REFERENCE(ShipmentMessage --> Order.OrderID) [+]
    - REFERENCE(ShipmentMessage --> Order.UserID) [+]
    - REFERENCE(ShipmentMessage --> AnalyticsMessage.UserID) [+]
    - REFERENCE(ShipmentMessage --> Bill.UserID) [+]

STOCK_DB:
- type: NoSQLDatabase
- kind: MongoDB
- dependencies: []
- schema:
  - fields:
    - _: shopping_app.Stock struct{ProductID string, Quantity int}
    - Stock: shopping_app.Stock struct{ProductID string, Quantity int}
  - unfolded_fields:
    - Stock: shopping_app.Stock struct{ProductID string, Quantity int}
    - Stock.ProductID: string
    - Stock.Quantity: int
  - constraints:
    - REFERENCE(Stock.ProductID --> Order.ProductID) [+]
    - REFERENCE(Stock.Quantity --> Order.Quantity) [+]
    - REFERENCE(Stock --> Order.ProductID) [+]
    - REFERENCE(Stock --> Order.Quantity) [+]
