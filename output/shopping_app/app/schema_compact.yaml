ANALYTICS_DB:
- type: NoSQLDatabase
- kind: MongoDB
- dependencies: []
- schema:
  - fields:
    - _: shopping_app.Analytics struct{UserID string, Categories []string}
    - Analytics: shopping_app.Analytics struct{UserID string, Categories []string}
  - unfolded_fields:
    - _.userID: string
    - Analytics: shopping_app.Analytics struct{UserID string, Categories []string}
    - Analytics.UserID: string
    - Analytics.Categories: '[]string'

ANALYTICS_QUEUE:
- type: Queue
- kind: RabbitMQ
- dependencies: []
- schema:
  - fields:
    - _: shopping_app.AnalyticsMessage struct{UserID string, ProductCategory string}
    - AnalyticsMessage: shopping_app.AnalyticsMessage struct{UserID string, ProductCategory string}
  - unfolded_fields:
    - AnalyticsMessage: shopping_app.AnalyticsMessage struct{UserID string, ProductCategory string}
    - AnalyticsMessage.UserID: string
    - AnalyticsMessage.ProductCategory: string
  - constraints:
    - REFERENCE(ANALYTICS_QUEUE.AnalyticsMessage.UserID --> ORDER_DB.Order.UserID)
      [+]
    - REFERENCE(ANALYTICS_QUEUE.AnalyticsMessage.UserID --> BILLING_DB.Bill.UserID)
      [+]
    - REFERENCE(ANALYTICS_QUEUE.AnalyticsMessage --> ORDER_DB.Order.UserID) [+]
    - REFERENCE(ANALYTICS_QUEUE.AnalyticsMessage --> BILLING_DB.Bill.UserID) [+]

BILLING_DB:
- type: NoSQLDatabase
- kind: MongoDB
- dependencies: []
- schema:
  - fields:
    - _: shopping_app.Bill struct{UserID string, ProductID string, Quantity int, PricePerUnit int, TotalCost }
    - Bill: shopping_app.Bill struct{UserID string, ProductID string, Quantity int, PricePerUnit int, TotalCost }
  - unfolded_fields:
    - Bill: shopping_app.Bill struct{UserID string, ProductID string, Quantity int, PricePerUnit int, TotalCost }
    - Bill.UserID: string
    - Bill.ProductID: string
    - Bill.Quantity: int
    - Bill.PricePerUnit: int
    - Bill.TotalCost: ""
  - constraints:
    - REFERENCE(BILLING_DB.Bill.Quantity --> ORDER_DB.Order.Quantity) [+]
    - REFERENCE(BILLING_DB.Bill.Quantity --> STOCK_DB.Stock.Quantity) [+]
    - REFERENCE(BILLING_DB.Bill.ProductID --> ORDER_DB.Order.ProductID) [+]
    - REFERENCE(BILLING_DB.Bill.ProductID --> STOCK_DB.Stock.ProductID) [+]
    - REFERENCE(BILLING_DB.Bill.UserID --> ORDER_DB.Order.UserID) [+]
    - REFERENCE(BILLING_DB.Bill.TotalCost --> ORDER_DB.Order.Quantity) [+]
    - REFERENCE(BILLING_DB.Bill.TotalCost --> STOCK_DB.Stock.Quantity) [+]
    - REFERENCE(BILLING_DB.Bill --> ORDER_DB.Order.ProductID) [+]
    - REFERENCE(BILLING_DB.Bill --> STOCK_DB.Stock.ProductID) [+]
    - REFERENCE(BILLING_DB.Bill --> ORDER_DB.Order.Quantity) [+]
    - REFERENCE(BILLING_DB.Bill --> STOCK_DB.Stock.Quantity) [+]
    - REFERENCE(BILLING_DB.Bill --> ORDER_DB.Order.UserID) [+]

CART_DB:
- type: NoSQLDatabase
- kind: MongoDB
- dependencies: []
- schema:
  - fields:
    - _: shopping_app.Cart struct{CartID string, UserID string, ProductID string, Quantity int, PricePerUnit int, Status string}
    - Cart: shopping_app.Cart struct{CartID string, UserID string, ProductID string, Quantity int, PricePerUnit int, Status string}
  - unfolded_fields:
    - _.cartID: string
    - Cart: shopping_app.Cart struct{CartID string, UserID string, ProductID string, Quantity int, PricePerUnit int, Status string}
    - Cart.CartID: string
    - Cart.UserID: string
    - Cart.ProductID: string
    - Cart.Quantity: int
    - Cart.PricePerUnit: int
    - Cart.Status: string

ORDER_DB:
- type: NoSQLDatabase
- kind: MongoDB
- dependencies: []
- schema:
  - fields:
    - _: shopping_app.Order struct{OrderID string, UserID string, ProductID string, Quantity int, Timestamp 1 int}
    - Order: shopping_app.Order struct{OrderID string, UserID string, ProductID string, Quantity int, Timestamp 1 int}
  - unfolded_fields:
    - _.orderID: string
    - Order: shopping_app.Order struct{OrderID string, UserID string, ProductID string, Quantity int, Timestamp 1 int}
    - Order.OrderID: string
    - Order.UserID: string
    - Order.ProductID: string
    - Order.Quantity: int
    - Order.Timestamp: 1 int

PRODUCT_DB:
- type: NoSQLDatabase
- kind: MongoDB
- dependencies: []
- schema:
  - fields:
    - _: <unknown type>
  - unfolded_fields:
    - _.productID: string

SHIPMENT_DB:
- type: NoSQLDatabase
- kind: MongoDB
- dependencies: []
- schema:
  - fields:
    - _: shopping_app.Shipment struct{OrderID string, UserID string, Status "pending" string}
    - Shipment: shopping_app.Shipment struct{OrderID string, UserID string, Status "pending" string}
  - unfolded_fields:
    - Shipment: shopping_app.Shipment struct{OrderID string, UserID string, Status "pending" string}
    - Shipment.OrderID: string
    - Shipment.UserID: string
    - Shipment.Status: '"pending" string'
  - constraints:
    - REFERENCE(SHIPMENT_DB.Shipment.OrderID --> ORDER_DB._.orderID)
    - REFERENCE(SHIPMENT_DB.Shipment --> ORDER_DB._.orderID)

SHIPMENT_QUEUE:
- type: Queue
- kind: RabbitMQ
- dependencies: []
- schema:
  - fields:
    - _: shopping_app.ShipmentMessage struct{OrderID string, UserID string}
    - ShipmentMessage: shopping_app.ShipmentMessage struct{OrderID string, UserID string}
  - unfolded_fields:
    - ShipmentMessage: shopping_app.ShipmentMessage struct{OrderID string, UserID string}
    - ShipmentMessage.OrderID: string
    - ShipmentMessage.UserID: string
  - constraints:
    - REFERENCE(SHIPMENT_QUEUE.ShipmentMessage.OrderID --> ORDER_DB.Order.OrderID)
      [+]
    - REFERENCE(SHIPMENT_QUEUE.ShipmentMessage.UserID --> ORDER_DB.Order.UserID) [+]
    - REFERENCE(SHIPMENT_QUEUE.ShipmentMessage.UserID --> ANALYTICS_QUEUE.AnalyticsMessage.UserID)
      [+]
    - REFERENCE(SHIPMENT_QUEUE.ShipmentMessage.UserID --> BILLING_DB.Bill.UserID)
      [+]
    - REFERENCE(SHIPMENT_QUEUE.ShipmentMessage --> ORDER_DB.Order.OrderID) [+]
    - REFERENCE(SHIPMENT_QUEUE.ShipmentMessage --> ORDER_DB.Order.UserID) [+]
    - REFERENCE(SHIPMENT_QUEUE.ShipmentMessage --> ANALYTICS_QUEUE.AnalyticsMessage.UserID)
      [+]
    - REFERENCE(SHIPMENT_QUEUE.ShipmentMessage --> BILLING_DB.Bill.UserID) [+]

STOCK_DB:
- type: NoSQLDatabase
- kind: MongoDB
- dependencies: []
- schema:
  - fields:
    - _: shopping_app.Stock struct{ProductID string, Quantity int}
    - Stock: shopping_app.Stock struct{ProductID string, Quantity int}
  - unfolded_fields:
    - Stock: shopping_app.Stock struct{ProductID string, Quantity int}
    - Stock.ProductID: string
    - Stock.Quantity: int
  - constraints:
    - REFERENCE(STOCK_DB.Stock.Quantity --> ORDER_DB.Order.Quantity) [+]
    - REFERENCE(STOCK_DB.Stock.ProductID --> ORDER_DB.Order.ProductID) [+]
    - REFERENCE(STOCK_DB.Stock --> ORDER_DB.Order.ProductID) [+]
    - REFERENCE(STOCK_DB.Stock --> ORDER_DB.Order.Quantity) [+]
