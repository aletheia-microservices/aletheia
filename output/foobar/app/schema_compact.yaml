BAR_DB:
- type: NoSQLDatabase
- kind: MongoDB
- dependencies: []
- schema:
  - fields:
    - _: bar.Bar struct{ID "id" string, Text string, Flag bool}
    - Bar: bar.Bar struct{ID "id" string, Text string, Flag bool}
  - unfolded_fields:
    - Bar: bar.Bar struct{ID "id" string, Text string, Flag bool}
    - Bar.ID: '"id" string'
    - Bar.Text: string
    - Bar.Flag: bool
  - constraints:
    - REFERENCE(BAR_DB.Bar.Text --> FOO_DB.Foo.Text) [+]
    - REFERENCE(BAR_DB.Bar --> FOO_DB.Foo.Text) [+]

FOO_DB:
- type: NoSQLDatabase
- kind: MongoDB
- dependencies: []
- schema:
  - fields:
    - _: foo.Foo struct{ID "id" string, Text string}
    - Foo: foo.Foo struct{ID "id" string, Text string}
  - unfolded_fields:
    - Foo: foo.Foo struct{ID "id" string, Text string}
    - Foo.ID: '"id" string'
    - Foo.Text: string
