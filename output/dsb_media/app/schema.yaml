MOVIEID_DB:
- type: NoSQLDatabase
- kind: MongoDB
- dependencies: []
- schema:
  - fields:
    - _: mediamicroservices.MovieId struct{MovieID string, Title string}
    - MovieId: mediamicroservices.MovieId struct{MovieID string, Title string}
  - unfolded_fields:
    - MovieId: mediamicroservices.MovieId struct{MovieID string, Title string}
    - MovieId.MovieID: string
    - MovieId.Title: string
  - constraints:
    - UNIQUE(MOVIEID_DB.MovieId.Title)

MOVIEINFO_DB:
- type: NoSQLDatabase
- kind: MongoDB
- dependencies: []
- schema:
  - fields:
    - _: mediamicroservices.MovieInfo struct{MovieID string, Title string, Casts string}
    - MovieInfo: mediamicroservices.MovieInfo struct{MovieID string, Title string, Casts string}
  - unfolded_fields:
    - MovieInfo: mediamicroservices.MovieInfo struct{MovieID string, Title string, Casts string}
    - MovieInfo.MovieID: string
    - MovieInfo.Title: string
    - MovieInfo.Casts: string
  - constraints:
    - REFERENCE(MOVIEINFO_DB.MovieInfo.MovieID --> MOVIEID_DB.MovieId.MovieID) [+]
    - REFERENCE(MOVIEINFO_DB.MovieInfo.Title --> MOVIEID_DB.MovieId.Title) [+]
    - REFERENCE(MOVIEINFO_DB.MovieInfo --> MOVIEID_DB.MovieId.MovieID) [+]
    - REFERENCE(MOVIEINFO_DB.MovieInfo --> MOVIEID_DB.MovieId.Title) [+]
