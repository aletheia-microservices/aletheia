AnalyticsService:
- fields:
    analyticsDb: NoSQLDatabase
    analyticsQueue: Queue
    numWorkers: int
- services: {}
- datastores:
    analytics_db: analytics_db MongoDB (NoSQLDatabase)
    analytics_queue: analytics_queue RabbitMQ (Queue)

NotifyService:
- fields:
    notificationsQueue: Queue
    num_workers: int
    storageService: StorageService
- services:
    StorageService: postnotification_simple.StorageService
- datastores:
    notifications_queue: notifications_queue RabbitMQ (Queue)

StorageService:
- fields:
    analyticsQueue: Queue
    postsDb: NoSQLDatabase
- services: {}
- datastores:
    analytics_queue: analytics_queue RabbitMQ (Queue)
    posts_db: posts_db MongoDB (NoSQLDatabase)

UploadService:
- fields:
    analyticsService: AnalyticsService
    notificationsQueue: Queue
    storageService: StorageService
- services:
    AnalyticsService: postnotification_simple.AnalyticsService
    StorageService: postnotification_simple.StorageService
- datastores:
    notifications_queue: notifications_queue RabbitMQ (Queue)
