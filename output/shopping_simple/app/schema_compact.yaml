CART_DB:
- type: NoSQLDatabase
- kind: MongoDB
- dependencies: []
- schema:
  - fields:
    - _: shopping_simple.Cart struct{CartID string, LastProductID string, TotalQuantity int, Products []string}
    - Cart: shopping_simple.Cart struct{CartID string, LastProductID string, TotalQuantity int, Products []string}
  - unfolded_fields:
    - Cart: shopping_simple.Cart struct{CartID string, LastProductID string, TotalQuantity int, Products []string}
    - Cart.CartID: string
    - Cart.LastProductID: string
    - Cart.TotalQuantity: int
    - Cart.Products: '[]string'
    - Cart.Products[*]: string
  - constraints:
    - REFERENCE(CART_DB.Cart.Products --> PRODUCT_DB.Product.ProductID)
    - REFERENCE(CART_DB.Cart.LastProductID --> PRODUCT_DB.Product.ProductID)
    - REFERENCE(CART_DB.Cart --> PRODUCT_DB.Product.ProductID)

PRODUCT_DB:
- type: NoSQLDatabase
- kind: MongoDB
- dependencies: []
- schema:
  - fields:
    - _: shopping_simple.Product struct{ProductID string, Description string, PricePerUnit int, Category string}
    - Product: shopping_simple.Product struct{ProductID string, Description string, PricePerUnit int, Category string}
  - unfolded_fields:
    - Product: shopping_simple.Product struct{ProductID string, Description string, PricePerUnit int, Category string}
    - Product.ProductID: string
    - Product.Description: string
    - Product.PricePerUnit: int
    - Product.Category: string

PRODUCT_QUEUE:
- type: Queue
- kind: RabbitMQ
- dependencies: []
- schema:
  - fields:
    - _: shopping_simple.ProductQueueMessage struct{ProductID string, Remove true bool}
    - ProductQueueMessage: shopping_simple.ProductQueueMessage struct{ProductID string, Remove true bool}
  - unfolded_fields:
    - ProductQueueMessage: shopping_simple.ProductQueueMessage struct{ProductID string, Remove true bool}
    - ProductQueueMessage.ProductID: string
    - ProductQueueMessage.Remove: true bool
