ANALYTICS_DB:
- type: NoSQLDatabase
- kind: MongoDB
- dependencies: []
- schema:
  - fields:
    - _: postnotification.Analytics struct{PostID int64}
    - Analytics: postnotification.Analytics struct{PostID int64}
  - unfolded_fields:
    - Analytics: postnotification.Analytics struct{PostID int64}
    - Analytics.PostID: int64
  - constraints:
    - REFERENCE(Analytics.PostID --> TriggerAnalyticsMessage.PostID) [+]
    - REFERENCE(Analytics.PostID --> Post.PostID) [+]
    - REFERENCE(Analytics --> TriggerAnalyticsMessage.PostID) [+]
    - REFERENCE(Analytics --> Post.PostID) [+]

ANALYTICS_QUEUE:
- type: Queue
- kind: RabbitMQ
- dependencies: []
- schema:
  - fields:
    - _: postnotification.TriggerAnalyticsMessage struct{PostID string}
    - TriggerAnalyticsMessage: postnotification.TriggerAnalyticsMessage struct{PostID string}
  - unfolded_fields:
    - TriggerAnalyticsMessage: postnotification.TriggerAnalyticsMessage struct{PostID string}
    - TriggerAnalyticsMessage.PostID: string
  - constraints:
    - REFERENCE(TriggerAnalyticsMessage.PostID --> Post.PostID) [+]
    - REFERENCE(TriggerAnalyticsMessage --> Post.PostID) [+]

MEDIA_DB:
- type: NoSQLDatabase
- kind: MongoDB
- dependencies: []
- schema:
  - fields:
    - _: postnotification.Media struct{MediaID int64, Content string}
    - Media: postnotification.Media struct{MediaID int64, Content string}
  - unfolded_fields:
    - _.mediaid: int64
    - Media: postnotification.Media struct{MediaID int64, Content string}
    - Media.MediaID: int64
    - Media.Content: string

NOTIFICATIONS_QUEUE:
- type: Queue
- kind: RabbitMQ
- dependencies: []
- schema:
  - fields:
    - _: postnotification.Message struct{ReqID string, PostID string, Timestamp string}
    - Message: postnotification.Message struct{ReqID string, PostID string, Timestamp string}
  - unfolded_fields:
    - Message: postnotification.Message struct{ReqID string, PostID string, Timestamp string}
    - Message.ReqID: string
    - Message.PostID: string
    - Message.Timestamp: string
  - constraints:
    - REFERENCE(Message.ReqID --> Post.ReqID) [+]
    - REFERENCE(Message.PostID --> Post.PostID) [+]
    - REFERENCE(Message.PostID --> TriggerAnalyticsMessage.PostID) [+]
    - REFERENCE(Message.PostID --> Analytics.PostID) [+]
    - REFERENCE(Message --> Post.PostID) [+]
    - REFERENCE(Message --> TriggerAnalyticsMessage.PostID) [+]
    - REFERENCE(Message --> Analytics.PostID) [+]
    - REFERENCE(Message --> Post.ReqID) [+]

POSTS_CACHE:
- type: Cache
- kind: Redis
- dependencies: []
- schema:
  - fields:
    - key: <unknown type>
    - value: <unknown type>
  - unfolded_fields: []

POSTS_DB:
- type: NoSQLDatabase
- kind: MongoDB
- dependencies: []
- schema:
  - fields:
    - _: postnotification.Post struct{ReqID int64, PostID int64, MediaID int64, Text string, Mentions []string, Timestamp int64, Creator postnotification.Creator struct{Username string}}
    - Post: postnotification.Post struct{ReqID int64, PostID int64, MediaID int64, Text string, Mentions []string, Timestamp int64, Creator postnotification.Creator struct{Username string}}
  - unfolded_fields:
    - Post: postnotification.Post struct{ReqID int64, PostID int64, MediaID int64, Text string, Mentions []string, Timestamp int64, Creator postnotification.Creator struct{Username string}}
    - Post.ReqID: int64
    - Post.PostID: int64
    - Post.MediaID: int64
    - Post.Text: string
    - Post.Mentions: '[]string'
    - Post.Timestamp: int64
    - Post.Creator: postnotification.Creator struct{Username string}
    - Post.Creator.Username: string

TIMELINE_CACHE:
- type: Cache
- kind: Redis
- dependencies: []
- schema:
  - fields:
    - key: string
    - value: Timeline
  - unfolded_fields: []
  - constraints:
    - REFERENCE(key --> Post.ReqID) [+]
    - REFERENCE(key --> Message.ReqID) [+]
    - REFERENCE(value --> Post.PostID) [+]
    - REFERENCE(value --> TriggerAnalyticsMessage.PostID) [+]
    - REFERENCE(value --> Message.PostID) [+]
    - REFERENCE(value --> Analytics.PostID) [+]
    - REFERENCE(value --> Post.ReqID) [+]
    - REFERENCE(value --> Message.ReqID) [+]
