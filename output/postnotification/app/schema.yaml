ANALYTICS_DB:
- type: NoSQLDatabase
- kind: MongoDB
- dependencies: []
- schema:
  - fields:
    - _: postnotification.Analytics struct{PostID int64}
    - Analytics: postnotification.Analytics struct{PostID int64}
  - unfolded_fields:
    - Analytics: postnotification.Analytics struct{PostID int64}
    - Analytics.PostID: int64
  - constraints:
    - REFERENCE(ANALYTICS_DB.Analytics.PostID --> ANALYTICS_QUEUE.TriggerAnalyticsMessage.PostID)
      [+]
    - REFERENCE(ANALYTICS_DB.Analytics.PostID --> POSTS_DB.Post.PostID) [+]
    - REFERENCE(ANALYTICS_DB.Analytics --> ANALYTICS_QUEUE.TriggerAnalyticsMessage.PostID)
      [+]
    - REFERENCE(ANALYTICS_DB.Analytics --> POSTS_DB.Post.PostID) [+]

ANALYTICS_QUEUE:
- type: Queue
- kind: RabbitMQ
- dependencies: []
- schema:
  - fields:
    - _: postnotification.TriggerAnalyticsMessage struct{PostID string}
    - TriggerAnalyticsMessage: postnotification.TriggerAnalyticsMessage struct{PostID string}
  - unfolded_fields:
    - TriggerAnalyticsMessage: postnotification.TriggerAnalyticsMessage struct{PostID string}
    - TriggerAnalyticsMessage.PostID: string
  - constraints:
    - REFERENCE(ANALYTICS_QUEUE.TriggerAnalyticsMessage.PostID --> POSTS_DB.Post.PostID)
      [+]
    - REFERENCE(ANALYTICS_QUEUE.TriggerAnalyticsMessage --> POSTS_DB.Post.PostID)
      [+]

MEDIA_DB:
- type: NoSQLDatabase
- kind: MongoDB
- dependencies: []
- schema:
  - fields:
    - _: postnotification.Media struct{MediaID int64, Content string}
    - Media: postnotification.Media struct{MediaID int64, Content string}
  - unfolded_fields:
    - _.mediaid: int64
    - Media: postnotification.Media struct{MediaID int64, Content string}
    - Media.MediaID: int64
    - Media.Content: string

NOTIFICATIONS_QUEUE:
- type: Queue
- kind: RabbitMQ
- dependencies: []
- schema:
  - fields:
    - _: postnotification.Message struct{ReqID string, PostID string, Timestamp string}
    - Message: postnotification.Message struct{ReqID string, PostID string, Timestamp string}
  - unfolded_fields:
    - Message: postnotification.Message struct{ReqID string, PostID string, Timestamp string}
    - Message.ReqID: string
    - Message.PostID: string
    - Message.Timestamp: string
  - constraints:
    - REFERENCE(NOTIFICATIONS_QUEUE.Message.ReqID --> POSTS_DB.Post.ReqID) [+]
    - REFERENCE(NOTIFICATIONS_QUEUE.Message --> POSTS_DB.Post.ReqID) [+]

POSTS_CACHE:
- type: Cache
- kind: Redis
- dependencies: []
- schema:
  - fields:
    - key: <unknown type>
    - value: <unknown type>
  - unfolded_fields: []

POSTS_DB:
- type: NoSQLDatabase
- kind: MongoDB
- dependencies: []
- schema:
  - fields:
    - _: postnotification.Post struct{ReqID int64, PostID int64, MediaID int64, Text string, Mentions []string, Timestamp int64, Creator postnotification.Creator struct{Username string}}
    - Post: postnotification.Post struct{ReqID int64, PostID int64, MediaID int64, Text string, Mentions []string, Timestamp int64, Creator postnotification.Creator struct{Username string}}
  - unfolded_fields:
    - Post: postnotification.Post struct{ReqID int64, PostID int64, MediaID int64, Text string, Mentions []string, Timestamp int64, Creator postnotification.Creator struct{Username string}}
    - Post.ReqID: int64
    - Post.PostID: int64
    - Post.MediaID: int64
    - Post.Text: string
    - Post.Mentions: '[]string'
    - Post.Timestamp: int64
    - Post.Creator: postnotification.Creator struct{Username string}
    - Post.Creator.Username: string

TIMELINE_CACHE:
- type: Cache
- kind: Redis
- dependencies: []
- schema:
  - fields:
    - key: string
    - value: Timeline
  - unfolded_fields: []
  - constraints:
    - REFERENCE(TIMELINE_CACHE.key --> POSTS_DB.Post.ReqID) [+]
    - REFERENCE(TIMELINE_CACHE.key --> NOTIFICATIONS_QUEUE.Message.ReqID) [+]
    - REFERENCE(TIMELINE_CACHE.value --> NOTIFICATIONS_QUEUE.Message.PostID) [+]
    - REFERENCE(TIMELINE_CACHE.value --> POSTS_DB.Post.PostID)
    - REFERENCE(TIMELINE_CACHE.value --> ANALYTICS_DB.Analytics.PostID)
    - REFERENCE(TIMELINE_CACHE.value --> POSTS_DB.Post.ReqID) [+]
    - REFERENCE(TIMELINE_CACHE.value --> NOTIFICATIONS_QUEUE.Message.ReqID) [+]
