COUPONS_DB:
- type: RelationalDB
- kind: MySQL
- dependencies: []
- schema:
  - fields:
    - coupons.coupon_id: int
    - coupons.category: string
    - coupons.value: int
    - claimed_coupons.coupon_id: int
    - claimed_coupons.*: SQL Table
    - claimed_coupons.user_id: int
  - unfolded_fields: []
  - constraints:
    - PRIMARY(coupons.coupon_id)
    - PRIMARY(claimed_coupons.coupon_id, claimed_coupons.user_id)

STUDENTS_DB:
- type: RelationalDB
- kind: MySQL
- dependencies: []
- schema:
  - fields:
    - students.student_id: int
    - students.name: string
    - students.*: SQL Table
    - students.balance: int
    - students.claimed_coupons: int
  - unfolded_fields: []
  - constraints:
    - REFERENCE(students.student_id --> claimed_coupons.user_id) [+]
    - CHECK(students.balance > 0)
    - CHECK(students.claimed_coupons < 10) - PRIMARY(students.student_id) 