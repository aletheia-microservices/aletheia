COUPONS_DB:
- type: NoSQLDatabase
- kind: MongoDB
- dependencies: []
- schema:
  - fields:
    - _: coupons_app.Coupon struct{CouponID int, Category string, NumClaims int}
    - Coupon: coupons_app.Coupon struct{CouponID int, Category string, NumClaims int}
    - ClaimedCoupon: coupons_app.ClaimedCoupon struct{CouponID int, UserID int}
  - unfolded_fields:
    - Coupon: coupons_app.Coupon struct{CouponID int, Category string, NumClaims int}
    - Coupon.CouponID: int
    - Coupon.Category: string
    - Coupon.NumClaims: int
    - ClaimedCoupon: coupons_app.ClaimedCoupon struct{CouponID int, UserID int}
    - ClaimedCoupon.CouponID: int
    - ClaimedCoupon.UserID: int
  - constraints:
    - CHECK(Coupon.NumClaims <= 100) - UNIQUE(COUPONS_DB.Coupon.CouponID) - UNIQUE(COUPONS_DB.ClaimedCoupon.CouponID, COUPONS_DB.ClaimedCoupon.UserID)  STUDENTS_DB: - type: NoSQLDatabase - kind: MongoDB - dependencies: [] - schema: - fields: - _: coupons_app.Student struct{StudentID int, Name string, Balance int, NumClaimedCoupons 0 int} - Student: coupons_app.Student struct{StudentID int, Name string, Balance int, NumClaimedCoupons 0 int} - unfolded_fields: - Student: coupons_app.Student struct{StudentID int, Name string, Balance int, NumClaimedCoupons 0 int} - Student.StudentID: int - Student.Name: string - Student.Balance: int - Student.NumClaimedCoupons: 0 int - constraints: - CHECK(Student.NumClaimedCoupons <= 10) - CHECK(Student.Balance >= 0)
    - UNIQUE(STUDENTS_DB.Student.StudentID)
